{% extends "base.html" %}
{% block title %}Reset Password - Kminst EP{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>🔑 Reset Password</h1>
            <p>Create a new password for <strong>{{ email }}</strong></p>
        </div>
        <form method="POST" action="{{ url_for('reset_password') }}" class="auth-form">
            <input type="hidden" name="email" value="{{ email }}">
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="Enter new password" minlength="4" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" minlength="4" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">✅ Reset Password</button>
        </form>
        <div class="auth-footer">
            <p><a href="{{ url_for('login') }}">← Back to Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
